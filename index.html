<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WW2 Journey Story Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <div id="map"></div>

    <div id="panel">
      <div class="intro-box">
        <div class="eyebrow">Family Story Map</div>
        <div><strong>From Tunisia to Cairo and Beyond</strong></div>
        <div class="intro-text">
          A step-through journey across North Africa and Italy during the war.
        </div>
      </div>

      <div class="eyebrow">Current Stop</div>
      <h1 id="title"></h1>
      <div class="subtitle" id="subtitle"></div>

      <div class="media-row">
        <div class="image-col">
          <div class="image" id="imageBox">
            <img id="storyImage" alt="Story image" />
            <div class="image-placeholder" id="imagePlaceholder">Image</div>
          </div>
          <div class="caption" id="caption"></div>
        </div>

        <div class="summary-col">
          <div class="summary-box">
            <div class="summary-title">Narrative</div>
            <div id="text"></div>
          </div>
        </div>
      </div>

      <div class="slider-wrap">
        <div class="slider-header">
          <div id="sliderStopLabel">Stop 1</div>
          <div id="sliderDateLabel"></div>
        </div>
        <input type="range" id="timelineSlider" min="0" max="0" step="1" value="0" />
        <div class="year-ticks" id="yearTicks"></div>
      </div>

      <div class="controls">
        <div class="button-row">
          <button id="prev">Previous</button>
          <button id="next">Next</button>
        </div>
        <div class="counter" id="counter"></div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="stopsarray.js"></script>
  <script src="app.js"></script>
</body>
</html>
